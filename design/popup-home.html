<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruo Tools — Popup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700&family=Figtree:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #ffffff;
  --bg-hover:    oklch(97% 0.005 72);
  --bg-active:   oklch(94% 0.008 72);
  --border:      oklch(91% 0.007 72);
  --text-1:      oklch(13% 0.009 72);
  --text-2:      oklch(42% 0.007 72);
  --text-3:      oklch(63% 0.005 72);
  --accent:      oklch(44% 0.130 30);
  --on:          oklch(54% 0.145 148);
  --font-display:'Bricolage Grotesque', system-ui, sans-serif;
  --font-ui:     'Figtree', system-ui, sans-serif;
}

body {
  font-family: var(--font-ui);
  background: oklch(87% 0.011 72);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
}

.preview-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
}

.preview-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: oklch(52% 0.008 72);
  background: oklch(92% 0.008 72);
  padding: 5px 12px;
  border-radius: 100px;
  border: 1px solid oklch(85% 0.009 72);
}

/* ── Popup shell ── */
.popup {
  width: 380px;
  background: var(--bg);
  border-radius: 20px;
  border: 1px solid oklch(84% 0.010 72);
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.9) inset,
    0 28px 60px oklch(28% 0.009 72 / 0.16),
    0 6px 18px  oklch(28% 0.009 72 / 0.08);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Header ── */
.popup-header {
  padding: 15px 16px 13px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}

.wordmark {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.05em;
  color: var(--text-1);
  line-height: 1;
  user-select: none;
}

.wordmark-dot { color: var(--accent); }

.header-right {
  display: flex;
  align-items: center;
  gap: 6px;
}

.active-pill {
  font-size: 11px;
  font-weight: 600;
  color: var(--on);
  background: oklch(95% 0.028 148);
  padding: 3px 9px;
  border-radius: 100px;
}

.icon-btn {
  width: 30px;
  height: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: none;
  background: transparent;
  color: var(--text-3);
  cursor: pointer;
  border-radius: 8px;
  transition: background 120ms, color 120ms;
  text-decoration: none;
}

.icon-btn:hover {
  background: var(--bg-hover);
  color: var(--text-1);
}

/* ── App grid ── */
.app-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  padding: 18px 10px 14px;
  gap: 4px 0;
}

/* ── App cell ── */
.app-cell {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 7px;
  padding: 10px 6px 9px;
  border-radius: 14px;
  cursor: pointer;
  text-decoration: none;
  transition: background 100ms;
  -webkit-tap-highlight-color: transparent;
}

.app-cell:hover  { background: var(--bg-hover); }
.app-cell:active { background: var(--bg-active); }

/* ── App icon ── */
.app-icon {
  width: 60px;
  height: 60px;
  border-radius: 17px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  transition: transform 130ms cubic-bezier(0.34, 1.4, 0.64, 1);
  flex-shrink: 0;
}

.app-cell:hover  .app-icon { transform: scale(1.05); }
.app-cell:active .app-icon { transform: scale(0.94); }

/* Status dot — bottom-right corner of icon */
.status-dot {
  position: absolute;
  bottom: 3px;
  right: 3px;
  width: 9px;
  height: 9px;
  border-radius: 50%;
  border: 2px solid var(--bg);
}

.status-dot.on  { background: var(--on); }
.status-dot.off { display: none; }

/* ── App name ── */
.app-name {
  font-size: 10.5px;
  font-weight: 500;
  color: var(--text-1);
  text-align: center;
  line-height: 1.25;
  max-width: 68px;
  word-break: keep-all;
  overflow-wrap: break-word;
}

/* Disabled app */
.app-cell.disabled .app-icon  { opacity: 0.38; }
.app-cell.disabled .app-name  { color: var(--text-3); }

/* ── Placeholder cell ── */
.app-cell.placeholder {
  cursor: default;
  pointer-events: none;
}

.app-cell.placeholder .app-icon {
  background: transparent;
  border: 1.5px dashed oklch(87% 0.007 72);
}

/* ── Footer ── */
.popup-footer {
  padding: 10px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.footer-text {
  font-size: 11px;
  color: var(--text-3);
}

.footer-text b {
  color: var(--text-2);
  font-weight: 600;
}

.footer-version {
  font-size: 11px;
  color: var(--text-3);
  font-family: 'Courier New', monospace;
}
</style>
</head>
<body>

<div class="preview-wrap">
  <div class="preview-label">Popup · 380px</div>

  <div class="popup">

    <!-- Header -->
    <header class="popup-header">
      <span class="wordmark">ruo<span class="wordmark-dot">·</span></span>
      <div class="header-right">
        <span class="active-pill">1 active</span>
        <a href="settings.html" class="icon-btn" title="设置">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="8" cy="8" r="2.4"/>
            <path d="M8 1.5v1.6M8 12.9v1.6M1.5 8h1.6M12.9 8h1.6M3.17 3.17l1.13 1.13M11.7 11.7l1.13 1.13M12.83 3.17l-1.13 1.13M4.3 11.7l-1.13 1.13"/>
          </svg>
        </a>
      </div>
    </header>

    <!-- App grid -->
    <main class="app-grid">

      <!-- Page Outline — enabled -->
      <a class="app-cell" href="popup-feature.html">
        <div class="app-icon" style="background: oklch(95.5% 0.020 60);">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none" stroke="oklch(38% 0.12 32)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <rect x="5.5" y="3.5" width="17" height="21" rx="2.5"/>
            <!-- H1 full width -->
            <line x1="8.5" y1="9"  x2="19.5" y2="9"/>
            <!-- H2 medium indent -->
            <line x1="8.5" y1="13" x2="17.5" y2="13"/>
            <!-- H3 more indent -->
            <line x1="8.5" y1="17" x2="15"   y2="17"/>
            <!-- H4 faint line -->
            <line x1="8.5" y1="21" x2="13"   y2="21" stroke-opacity="0.4"/>
          </svg>
          <span class="status-dot on"></span>
        </div>
        <span class="app-name">Page Outline</span>
      </a>

      <!-- Link Sanitizer — disabled -->
      <a class="app-cell disabled" href="popup-feature.html">
        <div class="app-icon" style="background: oklch(94.5% 0.007 72);">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none" stroke="oklch(56% 0.008 72)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <!-- chain link left -->
            <path d="M11 17.5l-1.5 1.5a3.5 3.5 0 1 1-4.95-4.95l3-3a3.5 3.5 0 0 1 5.3.48"/>
            <!-- chain link right -->
            <path d="M17 10.5l1.5-1.5a3.5 3.5 0 1 1 4.95 4.95l-3 3a3.5 3.5 0 0 1-5.3-.48"/>
            <!-- slash through -->
            <line x1="18" y1="8" x2="10" y2="20" stroke-width="1.5"/>
          </svg>
          <span class="status-dot off"></span>
        </div>
        <span class="app-name">Link Sanitizer</span>
      </a>

      <!-- Placeholder: add -->
      <div class="app-cell placeholder">
        <div class="app-icon">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="oklch(78% 0.007 72)" stroke-width="1.5" stroke-linecap="round">
            <line x1="9" y1="3" x2="9" y2="15"/>
            <line x1="3" y1="9" x2="15" y2="9"/>
          </svg>
        </div>
        <span class="app-name" style="color: oklch(75% 0.006 72); font-size: 10px;">添加</span>
      </div>

      <!-- Empty placeholder -->
      <div class="app-cell placeholder">
        <div class="app-icon" style="border: none;"></div>
        <span class="app-name"></span>
      </div>

    </main>

    <!-- Footer -->
    <footer class="popup-footer">
      <span class="footer-text"><b>1</b> / 2 已启用</span>
      <span class="footer-version">v0.1.0</span>
    </footer>

  </div>
</div>

</body>
</html>
