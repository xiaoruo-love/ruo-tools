<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruo Tools — Settings</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=Figtree:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:             #ffffff;
  --surface:        oklch(98.5% 0.004 72);
  --surface-hover:  oklch(97%   0.006 72);
  --border:         oklch(91%   0.007 72);
  --border-strong:  oklch(83%   0.010 72);
  --text-1:         oklch(13%   0.010 72);
  --text-2:         oklch(42%   0.007 72);
  --text-3:         oklch(63%   0.005 72);
  --accent:         oklch(44%   0.130 30);
  --on:             oklch(54%   0.145 148);
  --off:            oklch(79%   0.008 72);
  --font-display:   'Bricolage Grotesque', system-ui, sans-serif;
  --font-ui:        'Figtree', system-ui, sans-serif;
}

body {
  font-family: var(--font-ui);
  background: var(--bg);
  min-height: 100vh;
  color: var(--text-1);
}

/* ── Page layout ── */
.page {
  max-width: 760px;
  margin: 0 auto;
  padding: 0 24px 64px;
}

/* ── Page header ── */
.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 28px 0 24px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 28px;
}

.page-header-left {
  display: flex;
  align-items: baseline;
  gap: 10px;
}

.wordmark {
  font-family: var(--font-display);
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.05em;
  color: var(--text-1);
  line-height: 1;
}

.wordmark-accent { color: var(--accent); }

.page-title-sub {
  font-size: 14px;
  color: var(--text-3);
  font-weight: 400;
}

.header-version {
  font-size: 12px;
  color: var(--text-3);
  font-family: 'Courier New', monospace;
  letter-spacing: -0.01em;
}

/* ── Filter tabs ── */
.filter-tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 24px;
  overflow-x: auto;
  padding-bottom: 2px;
  scrollbar-width: none;
}

.filter-tabs::-webkit-scrollbar { display: none; }

.tab {
  font-size: 12.5px;
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--text-3);
  background: transparent;
  border: 1px solid var(--border);
  padding: 6px 14px;
  border-radius: 100px;
  cursor: pointer;
  white-space: nowrap;
  transition: background 120ms, color 120ms, border-color 120ms;
  user-select: none;
}

.tab:hover {
  background: var(--surface);
  color: var(--text-2);
}

.tab.active {
  background: var(--text-1);
  color: oklch(97% 0.004 74);
  border-color: var(--text-1);
}

/* ── Feature list ── */
.feature-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* ── Feature card ── */
.feature-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  transition: border-color 160ms;
}

.feature-card.is-expanded {
  border-color: var(--border-strong);
}

.feature-card-main {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 18px;
  cursor: pointer;
  transition: background 120ms;
}

.feature-card-main:hover {
  background: oklch(99.8% 0.003 74);
}

/* Feature mark (small) */
.feature-mark-sm {
  width: 40px;
  height: 40px;
  border-radius: 11px;
  border: 1px solid oklch(91% 0.025 32);
  background: oklch(97.5% 0.018 32);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.mark-hier-sm {
  display: flex;
  flex-direction: column;
  gap: 1.5px;
  user-select: none;
}

.mark-hier-sm span {
  font-family: var(--font-display);
  font-weight: 700;
  color: var(--accent);
  line-height: 1;
}

.mark-hier-sm .lv1 { font-size: 11px; }
.mark-hier-sm .lv2 { font-size: 8px;  opacity: 0.55; padding-left: 3px; }
.mark-hier-sm .lv3 { font-size: 6px;  opacity: 0.28; padding-left: 6px; }

/* URL mark */
.mark-url-sm {
  display: flex;
  flex-direction: column;
  gap: 1.5px;
  user-select: none;
}

.mark-url-sm .row {
  font-family: 'Courier New', monospace;
  font-size: 7.5px;
  line-height: 1.4;
  color: var(--text-3);
}

.mark-url-sm .row.clean  { color: var(--accent); font-weight: 700; }
.mark-url-sm .row.strike {
  text-decoration: line-through;
  text-decoration-color: oklch(58% 0.14 32);
  text-decoration-thickness: 1px;
  opacity: 0.5;
}

.feature-info {
  flex: 1;
  min-width: 0;
}

.feature-name-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 3px;
}

.feature-name {
  font-size: 14.5px;
  font-weight: 600;
  letter-spacing: -0.02em;
  color: var(--text-1);
}

.version-badge {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-3);
  background: oklch(93% 0.008 74);
  padding: 2px 6px;
  border-radius: 6px;
  font-family: 'Courier New', monospace;
  flex-shrink: 0;
}

.category-pill {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--accent);
  background: oklch(95% 0.020 32);
  padding: 2px 7px;
  border-radius: 100px;
  flex-shrink: 0;
}

.feature-desc {
  font-size: 12px;
  color: var(--text-3);
  line-height: 1.5;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.feature-card-right {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

/* Toggle switch (reused) */
.toggle-track {
  position: relative;
  width: 38px;
  height: 22px;
  border-radius: 100px;
  background: var(--off);
  cursor: pointer;
  transition: background 200ms ease;
  flex-shrink: 0;
}

.toggle-track.is-on { background: var(--on); }

.toggle-thumb {
  position: absolute;
  top: 3px;
  left: 3px;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: oklch(99.5% 0 0);
  box-shadow: 0 1px 4px oklch(20% 0.012 74 / 0.20);
  transition: transform 200ms cubic-bezier(0.34, 1.30, 0.64, 1);
}

.toggle-track.is-on .toggle-thumb { transform: translateX(16px); }

/* Chevron */
.chevron-btn {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: transparent;
  border: none;
  cursor: pointer;
  color: var(--text-3);
  border-radius: 7px;
  transition: background 120ms, color 120ms, transform 200ms;
}

.chevron-btn:hover { background: var(--surface-hover); color: var(--text-2); }
.chevron-btn.open  { transform: rotate(180deg); }

/* ── Expanded settings panel ── */
.feature-settings {
  display: none;
  padding: 0 18px 18px;
  border-top: 1px solid var(--border);
}

.feature-settings.open { display: block; }

.settings-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  padding-top: 18px;
}

.settings-grid.single-col { grid-template-columns: 1fr; }

.setting-field {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.setting-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-2);
  letter-spacing: -0.01em;
}

.setting-hint {
  font-size: 11px;
  color: var(--text-3);
  line-height: 1.4;
}

.setting-input {
  font-family: var(--font-ui);
  font-size: 13px;
  color: var(--text-1);
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 9px;
  padding: 8px 11px;
  outline: none;
  transition: border-color 120ms;
  width: 100%;
}

.setting-input:focus { border-color: var(--border-strong); }

/* Color swatches (compact) */
.swatch-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.swatch {
  width: 24px;
  height: 24px;
  border-radius: 7px;
  cursor: pointer;
  border: 2px solid transparent;
  transition: transform 100ms, border-color 100ms;
}

.swatch.selected {
  border-color: var(--text-1);
  transform: scale(1.12);
}

/* ── Section header ── */
.list-section-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-3);
  padding: 8px 0 10px;
  margin-top: 6px;
}

/* ── Empty state ── */
.empty-state {
  text-align: center;
  padding: 64px 24px;
}

.empty-icon {
  font-size: 32px;
  margin-bottom: 12px;
  opacity: 0.5;
}

.empty-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-2);
  margin-bottom: 6px;
}

.empty-desc {
  font-size: 13px;
  color: var(--text-3);
}
</style>
</head>
<body>

<div class="page">

  <!-- Page header -->
  <header class="page-header">
    <div class="page-header-left">
      <span class="wordmark">ruo<span class="wordmark-accent">.</span></span>
      <span class="page-title-sub">设置</span>
    </div>
    <span class="header-version">v0.1.0</span>
  </header>

  <!-- Filter tabs -->
  <div class="filter-tabs" id="tabs">
    <button class="tab active" data-filter="all"    onclick="filterTabs(this, 'all')">全部</button>
    <button class="tab"        data-filter="developer" onclick="filterTabs(this, 'developer')">开发者</button>
    <button class="tab"        data-filter="privacy"   onclick="filterTabs(this, 'privacy')">隐私</button>
    <button class="tab"        data-filter="productivity" onclick="filterTabs(this, 'productivity')">效率</button>
    <button class="tab"        data-filter="accessibility" onclick="filterTabs(this, 'accessibility')">无障碍</button>
  </div>

  <!-- Feature list -->
  <div class="feature-list" id="featureList">

    <!-- Section: Developer -->
    <div class="list-section-label" data-section="developer">开发者</div>

    <!-- Feature 1: Page Outline -->
    <div class="feature-card" data-category="developer">
      <div class="feature-card-main" onclick="toggleExpand(this)">
        <div class="feature-mark-sm">
          <div class="mark-hier-sm">
            <span class="lv1">H¹</span>
            <span class="lv2">H²</span>
            <span class="lv3">H³</span>
          </div>
        </div>
        <div class="feature-info">
          <div class="feature-name-row">
            <span class="feature-name">Page Outline</span>
            <span class="version-badge">v1.0.0</span>
            <span class="category-pill">developer</span>
          </div>
          <div class="feature-desc">为页面标题元素添加可见轮廓线，直观显示文档层级结构。</div>
        </div>
        <div class="feature-card-right">
          <div class="toggle-track is-on" onclick="event.stopPropagation(); this.classList.toggle('is-on')">
            <div class="toggle-thumb"></div>
          </div>
          <button class="chevron-btn" aria-label="展开设置">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 4.5L6.5 9L11 4.5"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Expanded settings -->
      <div class="feature-settings open">
        <div class="settings-grid">
          <div class="setting-field">
            <span class="setting-label">轮廓颜色</span>
            <span class="setting-hint">H1–H6 的 outline 颜色。</span>
            <div class="swatch-row">
              <div class="swatch selected" style="background: oklch(44% 0.13 30);"></div>
              <div class="swatch" style="background: oklch(50% 0.14 148);"></div>
              <div class="swatch" style="background: oklch(48% 0.16 250);"></div>
              <div class="swatch" style="background: oklch(46% 0.14 290);"></div>
              <div class="swatch" style="background: oklch(60% 0.01 74);"></div>
            </div>
          </div>
          <div class="setting-field">
            <span class="setting-label">显示范围</span>
            <span class="setting-hint">哪些页面上激活此功能。</span>
            <select class="setting-input">
              <option>所有网站</option>
              <option>仅特定网站</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <!-- Section: Privacy -->
    <div class="list-section-label" data-section="privacy">隐私</div>

    <!-- Feature 2: Link Sanitizer -->
    <div class="feature-card" data-category="privacy">
      <div class="feature-card-main" onclick="toggleExpand(this)">
        <div class="feature-mark-sm">
          <div class="mark-url-sm">
            <span class="row clean">url/</span>
            <span class="row strike">?utm_s</span>
            <span class="row strike">?fbclid</span>
          </div>
        </div>
        <div class="feature-info">
          <div class="feature-name-row">
            <span class="feature-name">Link Sanitizer</span>
            <span class="version-badge">v1.0.0</span>
            <span class="category-pill" style="color: oklch(44% 0.13 250); background: oklch(95% 0.018 250);">privacy</span>
          </div>
          <div class="feature-desc">自动去除链接中的跟踪参数，保护浏览隐私。</div>
        </div>
        <div class="feature-card-right">
          <div class="toggle-track" onclick="event.stopPropagation(); this.classList.toggle('is-on')">
            <div class="toggle-thumb"></div>
          </div>
          <button class="chevron-btn" aria-label="展开设置">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 4.5L6.5 9L11 4.5"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Expanded settings (collapsed by default) -->
      <div class="feature-settings">
        <div class="settings-grid single-col">
          <div class="setting-field">
            <span class="setting-label">额外追踪参数</span>
            <span class="setting-hint">每行一个，追加到内置规则之外。</span>
            <textarea class="setting-input" rows="3" style="resize: vertical; font-family: 'Courier New', monospace; font-size: 12px;">ref
source
campaign</textarea>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /feature-list -->

</div><!-- /page -->

<script>
function toggleExpand(mainEl) {
  const card = mainEl.closest('.feature-card');
  const settings = card.querySelector('.feature-settings');
  const chevron  = card.querySelector('.chevron-btn');
  const isOpen = settings.classList.contains('open');

  settings.classList.toggle('open', !isOpen);
  chevron.classList.toggle('open',  !isOpen);
  card.classList.toggle('is-expanded', !isOpen);
}

function filterTabs(btn, filter) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');

  const cards    = document.querySelectorAll('.feature-card');
  const sections = document.querySelectorAll('.list-section-label');

  cards.forEach(card => {
    const match = filter === 'all' || card.dataset.category === filter;
    card.style.display = match ? '' : 'none';
  });

  sections.forEach(section => {
    const sectionCategory = section.dataset.section;
    if (filter === 'all') {
      section.style.display = '';
    } else {
      section.style.display = sectionCategory === filter ? '' : 'none';
    }
  });
}
</script>
</body>
</html>
